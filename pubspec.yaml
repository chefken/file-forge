name: converto_app
description: Offline file converter and viewer app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Image picking
  image_picker: ^1.1.2

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # PDF viewing
  flutter_pdfview: ^1.3.2

  # File picking (for docx, pdf)
  file_picker: ^8.0.3

  # Image editing
  image: ^4.1.7

  # Image cropping (FIXED VERSION)
  image_cropper: ^8.0.1

  # File system
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1

  # Drag to reorder
  drag_and_drop_lists: ^0.4.2

  # DOCX parsing
  archive: ^3.4.10
  xml: ^6.5.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # 🔥 APP ICON GENERATOR
  flutter_launcher_icons: ^0.13.1

# 🔥 ICON CONFIG
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/